name: Arabic Text Extraction Ruby
on: [push, workflow_dispatch]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Gems
        run: gem install google-lens-ocr

      - name: Run Extraction
        run: ruby extract.rb

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: my-extracted-notes
          path: Extracted_Texts/
