name: Arabic Text Extraction
on: [push, workflow_dispatch]

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphicsmagick ghostscript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS Packages
        run: npm install chrome-lens-ocr pdf2pic

      - name: Run Extraction
        run: node extract.js

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: my-extracted-notes
          path: Extracted_Texts/
